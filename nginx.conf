server {
    listen 80;
    server_name birat.codes www.birat.codes;

    return 301 https://birat.codes$request_uri;
}

server {
    listen 8080;
    server_name localhost birat.codes www.birat.codes;
    root /usr/share/nginx/html;
    index index.html;

    # Hide Nginx version in headers and error pages
    server_tokens off;

    # Enable gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_static on;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss application/wasm image/svg+xml;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';" always;

    # Cache static assets
    # NOTE: add_header in a location block overrides server-level add_header,
    # so security headers must be repeated here.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';" always;
    }

    # Blog routes should resolve through SPA shell even on hard reload.
    # This prevents serving prerendered standalone HTML that omits the main
    # app CSS/font pipeline and can appear visually broken.
    location = /blog {
        try_files /index.html =404;
        add_header X-Robots-Tag "index, follow" always;
    }

    location ^~ /blog/ {
        try_files /index.html =404;
        add_header X-Robots-Tag "index, follow" always;
    }

    # SPA routing - serve index.html for all routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Robots-Tag "index, follow" always;
    }

    # HTML files should not be long-cached (ensures fresh content on deploy)
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate";
        add_header X-Robots-Tag "index, follow" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self';" always;
    }

    # Sitemap and robots with moderate cache
    location ~* (sitemap\.xml|robots\.txt|rss\.xml|llms\.txt|llms-full\.txt)$ {
        expires 1d;
        add_header Cache-Control "public";
        add_header X-Robots-Tag "index, follow" always;
    }

    # Canonical host normalization for proxied requests.
    if ($host = www.birat.codes) {
        return 301 https://birat.codes$request_uri;
    }

    # Health check endpoint
    location /health {
        access_log off;
        default_type text/plain;
        return 200 "OK\n";
    }
}