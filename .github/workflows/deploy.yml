name: Deploy to birat.codes

on:
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          # Using Auth Key for immediate recovery and stability
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Verify Connection (Port 22 Check)
        run: |
          echo "Checking Tailscale status..."
          tailscale status
          echo "Testing SSH connection to ${{ secrets.VM_HOST }} on port 22..."
          # 'nc' (netcat) is used instead of 'ping' because your ACLs block ping 
          # but allow SSH. This prevents the workflow from failing unnecessarily.
          nc -zv ${{ secrets.VM_HOST }} 22

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script_stop: true
          script: |
            # Navigate to the project folder
            cd ~/portfolio

            # Pull latest changes from master
            git pull origin master

            # Install and build on the server
            npm ci
            npm run build

            # Copy the built files to the web server directory
            sudo cp -r dist/* /var/www/html/

            echo "Successfully deployed at $(date)"
