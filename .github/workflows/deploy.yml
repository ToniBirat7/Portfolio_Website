name: Deploy to birat.codes

on:
  workflow_dispatch: # Allows you to run it manually from the "Actions" tab
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Connect to Tailscale
        uses: tailscale/github-action@v2
        with:
          # Using Auth Key for immediate recovery and stability
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Verify Connection (Port 22 Check)
        run: |
          echo "Checking Tailscale status..."
          tailscale status
          echo "Testing SSH connection to ${{ secrets.VM_HOST }} on port 22..."
          # 'nc' (netcat) is used instead of 'ping' because your ACLs block ping 
          # but allow SSH. This prevents the workflow from failing unnecessarily.
          nc -zv ${{ secrets.VM_HOST }} 22

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: 22
          timeout: 30s
          command_timeout: 10m
          script_stop: true
          script: |
            # Navigate to the project folder
            cd ~/portfolio

            # Stash any local modifications created on the VM so pull can proceed.
            # This keeps deploy non-interactive and avoids merge-abort failures.
            git stash push --include-untracked -m "pre-deploy-$(date +%s)" || true

            # Pull latest changes from master (fast-forward only for predictable deploys)
            git pull --ff-only origin master

            # Ensure deterministic installs on long-lived VM workspace.
            # Prevent npm ENOTEMPTY errors from stale directories.
            rm -rf node_modules

            # Install and build on the server
            npm ci

            # Build-time AdSense config for Vite production bundle.
            # We enforce the publisher ID and preserve any existing slot ID on the VM.
            if [ -f .env.production ]; then
              if grep -q '^VITE_ADSENSE_CLIENT_ID=' .env.production; then
                sed -i 's/^VITE_ADSENSE_CLIENT_ID=.*/VITE_ADSENSE_CLIENT_ID=ca-pub-1567291488769443/' .env.production
              else
                echo 'VITE_ADSENSE_CLIENT_ID=ca-pub-1567291488769443' >> .env.production
              fi
            else
              cat > .env.production <<'EOF'
              VITE_ADSENSE_CLIENT_ID=ca-pub-1567291488769443
              EOF
            fi

            npm run build

            # Copy the built files to the web server directory
            sudo cp -r dist/* /var/www/html/

            echo "Successfully deployed at $(date)"
